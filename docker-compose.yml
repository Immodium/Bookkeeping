version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: slimbooks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slimbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slimbooks}
      POSTGRES_DB: ${POSTGRES_DB:-slimbooks}
    volumes:
      - slimbooks_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slimbooks}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  slimbooks:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slimbooks-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    
    # Security settings
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    
    # Inject host .env secrets (environment: block overrides these where needed)
    env_file:
      - .env

    # Port mapping - expose on all interfaces for network access
    ports:
      - "8080:3002"

    # Environment variables
    environment:
      - NODE_ENV=production
      - ENABLE_HTTPS=true
      - SSL_KEY_PATH=/app/certs/server.key
      - SSL_CERT_PATH=/app/certs/server.crt
      - CORS_ORIGIN=https://localhost:8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-slimbooks}:${POSTGRES_PASSWORD:-slimbooks}@postgres:5432/${POSTGRES_DB:-slimbooks}?sslmode=disable
    
    # Volume mounts for persistent data
    volumes:
      - slimbooks_data:/app/data
      - slimbooks_uploads:/app/uploads
      - slimbooks_logs:/app/logs
      - ./certs:/app/certs:ro
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:3002/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for data persistence
volumes:
  slimbooks_postgres:
    driver: local
  slimbooks_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  slimbooks_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./uploads
  slimbooks_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs

# Network configuration
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
