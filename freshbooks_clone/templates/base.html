<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FreshBooks Clone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">FreshBooks Clone</div>
      <nav class="nav">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('clients') }}">Clients</a>
        <a href="{{ url_for('invoices') }}">Invoices</a>
        <a href="{{ url_for('time_entries') }}">Time Tracking</a>
        <a href="{{ url_for('expenses') }}">Expenses</a>
      </nav>
    </header>

    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="alerts flash-list">
            {% for category, message in messages %}
              <div class="alert flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
